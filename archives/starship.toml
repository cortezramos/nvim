# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Formato general del prompt
format = """
[╭─](bold green) $directory$git_branch$git_status$java$nodejs$python$rust$package$memory_usage[╰─](bold green) 🤓"""

[directory]
truncation_length = 3
style = "bold blue"
truncate_to_repo = true

[time]
format = "🕙 $time "
style = "bold yellow"
time_format = "%H:%M:%S"

[username]
format = "[$user]($style_user) "
style = "bold green"
show_always = true

[cmd_duration]
format = "took [$duration]($style) "
style = "bold yellow"

[git_branch]
symbol = "󰊢 "
style = "bold bright-purple"
format = "($style)[$symbol]($style)[$branch]($style) "

# Muestra la versión de Node.js (indispensable para React/Vue)
[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"
detect_files = ["package.json", ".node-version", "pnpm-lock.yaml", "yarn.lock"]

# Muestra información del proyecto (nombre y versión del package.json)
[package]
disabled = true
symbol = "󰏗 "
style = "bold 208" # Color naranja tipo npm
format = "is [$symbol$version]($style) "

[custom.react]
detect_files = ["App.jsx", "App.tsx", "index.js", "index.tsx"]
detect_extensions = ["jsx", "tsx"]
symbol = " " # Icono de átomo para React
style = "bold cyan"
format = "[$symbol]($style) "

# Símbolo para Vue
[custom.vue]
detect_files = ["vite.config.ts", "vite.config.js", "vue.config.js"]
detect_extensions = ["vue"]
symbol = "󰡄 " # Icono de Vue
style = "bold green"
format = "[$symbol]($style) "

# Detecta si estás usando herramientas de construcción como Vite (común en Vue/React)
[custom.vite]
detect_files = ["vite.config.ts", "vite.config.js"]
symbol = "⚡ Vite "
style = "bold yellow"
format = "[$symbol]($style)"

[java]
symbol = " "
style = "bg:#06969A fg:#090618"
format = "[[ $symbol ($version) ]($style)]($style)"

[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'

[battery]
full_symbol = '🔋 '
charging_symbol = '⚡️ '
discharging_symbol = '💀 '

[[battery.display]]
threshold = 10
style = 'bold red'

[docker_context]
format = 'via [🐋 $context](blue bold)'

[golang]
format = 'via [🏎💨 $version](bold cyan) '

# ~/.config/starship.toml

[lua]
format = 'via [🌕 $version](bold blue) '
