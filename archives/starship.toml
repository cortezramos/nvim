
# Get editor completions based on the config schema
#"$schema" = 'https://starship.rs/config-schema.json'

format = """\
($directory)\
$os\
$git_branch\
$fill\
$nodejs\
$rust\
$golang\
$php\
$bun\
$java\
$c\
$conda\
$zig\
$cmd_duration\
$time\
\n$character\
"""

add_newline = true
command_timeout = 3600000

[fill]
symbol = ' '

[character]
# El Batman amarillo si todo va bien, rojo si hay error
success_symbol = "[ 󰭟 ](bold yellow)"
error_symbol = "[ 󰭟 ](bold red)"
vimcmd_symbol = "[N](bold red)"
vimcmd_replace_one_symbol = "[R](bold peach)"
vimcmd_visual_symbol = "[V](bold mauve)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:blue"
read_only_style = "fg:blue"
before_repo_root_style = "fg:blue"
truncation_symbol = "…/"
truncate_to_repo = true
read_only = "  "


[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[time]
format = "🕙 $time "
style = "bold yellow"
time_format = "%H:%M:%S"

[username]
format = "[$user]($style_user) "
style = "bold green"
show_always = true

[cmd_duration]
format = "took [$duration]($style) "
style = "bold yellow"
min_time = 5

[git_branch]
symbol = "󰊢 "
style = "bold bright-purple"
format = "-> [$symbol$branch]($style)"

[git_status]
format = '[$all_status$ahead_behind ]($style)'
style = "fg:text bg:pink"

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"
detect_files = ["package.json", ".node-version", "pnpm-lock.yaml", "yarn.lock"]

# Muestra información del proyecto (nombre y versión del package.json)
[package]
disabled = true
symbol = "󰏗 "
style = "bold 208" # Color naranja tipo npm
format = "is [$symbol$version]($style) "

[custom.react]
detect_files = ["App.jsx", "App.tsx", "index.js", "index.tsx"]
detect_extensions = ["jsx", "tsx"]
symbol = " " # Icono de átomo para React
style = "bold cyan"
format = "[$symbol]($style) "

# Símbolo para Vue
[custom.vue]
detect_files = ["vite.config.ts", "vite.config.js", "vue.config.js"]
detect_extensions = ["vue"]
symbol = "󰡄 " # Icono de Vue
style = "bold green"
format = "[$symbol]($style) "

# Detecta si estás usando herramientas de construcción como Vite (común en Vue/React)
[custom.vite]
detect_files = ["vite.config.ts", "vite.config.js"]
symbol = "⚡ Vite "
style = "bold yellow"
format = "[$symbol]($style)"

[java]
symbol = " "
style = "bg:#06969A fg:#090618"
format = "[[ $symbol ($version) ](fg:red)]($style)"

[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'

[battery]
full_symbol = '🔋 '
charging_symbol = '⚡️ '
discharging_symbol = '💀 '

[[battery.display]]
threshold = 10
style = 'bold red'

[docker_context]
format = 'via [🐋 $context](blue bold)'

[golang]
format = '[[ 🏎💨 $version ](fg:teal)]($style) '

[bun]
version_format = "$raw"
format = '[[ $symbol ($version) ](fg:text)]($style)'
disabled = false

# ~/.config/starship.toml

[lua]
format = 'via [🌕 $version](bold blue) '
